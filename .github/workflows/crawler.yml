name: 展会爬虫更新JSON
on:
  push:
    schedule:
      # 每日凌晨2点自动运行，更新数据
      - cron: "0 2 * * *"
jobs:
  spider:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium
      - name: 执行爬虫脚本
        run: python spider.py
      - name: 提交更新后的JSON
        run: |
          git config --global user.name "GitHub Spider Bot"
          git config --global user.email "bot@github.com"
          git add exhibitions.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新展会数据" && git push)
